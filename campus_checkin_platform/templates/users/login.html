{% extends 'base.html' %}

{% block title %}登录 - 校园打卡平台{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="glass-card">
            <div class="text-center mb-4">
                <i class="fas fa-user-circle fa-4x text-primary mb-3"></i>
                <h2>用户登录</h2>
                <p class="text-muted">欢迎回到校园打卡平台</p>
            </div>
            
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="id_username" class="form-label">用户名/学号</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" name="username" class="form-control" id="id_username" 
                               placeholder="请输入用户名或学号" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="id_password" class="form-label">密码</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" class="form-control" id="id_password" 
                               placeholder="请输入密码" required>
                    </div>
                </div>
                
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">记住我</label>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mb-3">
                    <i class="fas fa-sign-in-alt me-2"></i>登录
                </button>
            </form>
            
            <div class="text-center">
                <p class="mb-2">还没有账号？<a href="{% url 'users:register' %}">立即注册</a></p>
                <a href="{% url 'index' %}" class="text-muted small">
                    <i class="fas fa-arrow-left me-1"></i>返回首页
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
